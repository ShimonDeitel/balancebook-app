name: Balancebook
options:
  bundleIdPrefix: com.shimondeitel.balancebook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Balancebook:
    type: application
    platform: iOS
    sources:
      - path: Balancebook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.balancebook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Balancebook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BalancebookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BalancebookTests
      - path: Balancebook.storekit
    dependencies:
      - target: Balancebook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.balancebook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BalancebookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BalancebookUITests
    dependencies:
      - target: Balancebook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.balancebook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Balancebook:
    build:
      targets:
        Balancebook: all
        BalancebookTests: [test]
        BalancebookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Balancebook.storekit
    test:
      config: Debug
      storeKitConfiguration: Balancebook.storekit
      targets:
        - BalancebookTests
        - BalancebookUITests
    archive:
      config: Release
